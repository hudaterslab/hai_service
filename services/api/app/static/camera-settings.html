<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css?v=20260303-camera-flow4" />
  </head>
  <body class="subpage">
    <div class="bg-mesh"></div>

    <header class="topbar">
      <div class="topbar-title">
        <h1>Camera Settings</h1>
        <p>카메라별 모델, 이벤트, ROI를 통합 설정합니다.</p>
      </div>
      <div class="topbar-actions">
        <a class="back-link" href="/">대시보드로</a>
        <button id="camSettingRefreshBtn" type="button">새로고침</button>
      </div>
    </header>

    <main class="workspace subpage-workspace">
      <section class="panel panel-wide settings-card">
        <div class="section-head">
          <h2>카메라 설정</h2>
          <p>카메라 선택, 이름, 모델, 이벤트를 한 번에 저장합니다.</p>
        </div>
        <form id="cameraMainForm" class="grid">
          <select id="cameraSelect" required></select>
          <input id="cameraName2" placeholder="카메라 이름" required />

          <select id="cameraModelEnabled2" name="enabled">
            <option value="true">카메라 모델 사용</option>
            <option value="false">카메라 모델 미사용</option>
          </select>
          <input id="cameraModelPath2" name="modelPath" placeholder="/opt/vms/models/yolov8n.pt" />
          <input id="cameraModelConf2" name="confidenceThreshold" type="number" min="0.05" max="0.95" step="0.05" value="0.35" />
          <input id="cameraModelTimeoutSec2" name="timeoutSec" type="number" min="1" value="5" />
          <input id="cameraModelPollSec2" name="pollSec" type="number" min="0" step="0.1" value="2" />
          <input id="cameraModelCooldownSec2" name="cooldownSec" type="number" min="0" value="10" />

          <div id="eventTypePicker2" class="event-type-picker">
            <label><input type="checkbox" value="conveyor_crossing" /> 컨베이어벨트 횡단</label>
            <label><input type="checkbox" value="helmet_missing" /> 헬멧 미착용</label>
            <label><input type="checkbox" value="illegal_parking" /> 불법 주정차</label>
            <label><input type="checkbox" value="unauthorized_departure" /> 신호수 없을 때 출발차량(임의출발)</label>
          </div>

          <select id="policyMode2" name="mode">
            <option value="snapshot">스냅샷</option>
            <option value="clip">클립</option>
          </select>
          <input id="policyPreSec2" type="number" min="0" value="10" />
          <input id="policyPostSec2" type="number" min="1" value="20" />
          <input id="policySnapshotCount2" type="number" min="1" max="10" value="1" />
          <input id="policySnapshotIntervalMs2" type="number" min="0" value="0" />

          <div class="roi-gate-row">
            <button id="openRoiModalBtn" type="button" class="is-hidden">ROI 설정 열기</button>
            <span id="roiRequiredHint" class="roi-required-hint"></span>
          </div>

          <button id="cameraSaveBtn" type="submit">카메라 세팅 저장</button>
        </form>
        <div id="cameraSummaryChips" class="summary-chips"></div>
        <div id="cameraMainInfo" class="list"></div>
      </section>
    </main>

    <div id="roiModal2" class="modal-backdrop" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-label="ROI 설정">
        <div class="modal-head">
          <h3>ROI 설정</h3>
          <button id="closeRoiModalBtn" type="button">닫기</button>
        </div>
        <form id="cameraRoiOnlyForm" class="grid">
          <select id="roiEnabled2" name="enabled">
            <option value="true">ROI 사용</option>
            <option value="false">ROI 미사용</option>
          </select>
          <div class="roi-toolbar">
            <button type="button" id="roiRectModeBtn2">사각형 모드</button>
            <button type="button" id="roiPolyModeBtn2">다각형 모드</button>
            <button type="button" id="roiPolyDoneBtn2">다각형 완료</button>
          </div>
          <button type="button" id="roiSnapshotBtn2">스냅샷 갱신</button>
          <button type="button" id="roiDeleteBtn2">선택 영역 삭제</button>
          <button type="button" id="roiClearBtn2">전체 삭제</button>
          <div class="roi-canvas-wrap">
            <canvas id="roiCanvas2" width="960" height="540"></canvas>
          </div>
          <textarea id="roiZones2" rows="6"></textarea>
          <button type="submit">ROI 저장</button>
        </form>
        <div id="cameraRoiOnlyInfo" class="list"></div>
      </div>
    </div>

    <script src="/static/camera-settings.js?v=20260304-camera-flow9"></script>
  </body>
</html>
